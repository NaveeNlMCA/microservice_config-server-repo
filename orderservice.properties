# ==============================
# Server
# ==============================
server.port=8083

# ==============================
# Spring Application
# ==============================
spring.application.name=order-service

# ==============================
# Datasource (PostgreSQL)
# ==============================
spring.datasource.url=jdbc:postgresql://postgres:5432/order_db
spring.datasource.username=postgres
spring.datasource.password=topnotch

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# Spring Cloud Config
# ==============================
spring.cloud.config.enabled=false

# ==============================
# Eureka Client
# ==============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=WDwKi3xzr-5U1I3TkEB2IBryxmJtcZ4dSs4QIRWyT3tr43AMUrOdvEuQrczakj0Y4Z78ICvRdIT9ZsRMpxHUSQ

# ==============================
# Spring Boot Admin Client
# ==============================
spring.boot.admin.client.url=http://localhost:9090

# ==============================
# Actuator
# ==============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.listener.ack-mode=manual

# Reliability
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# Consumer safety
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.isolation.level=read_committed

# Performance tuning
spring.kafka.producer.properties.batch.size=16384
spring.kafka.producer.properties.linger.ms=5
spring.kafka.producer.properties.compression.type=snappy
