# ==============================
# Server
# ==============================
server.port=8082

# ==============================
# Spring Application
# ==============================
spring.application.name=product-service

# ==============================
# Datasource (PostgreSQL)
# ==============================
spring.datasource.url=jdbc:postgresql://localhost:5432/product_db
spring.datasource.username=postgres
spring.datasource.password=topnotch

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# Eureka Client
# ==============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=WDwKi3xzr-5U1I3TkEB2IBryxmJtcZ4dSs4QIRWyT3tr43AMUrOdvEuQrczakj0Y4Z78ICvRdIT9ZsRMpxHUSQ

# ==============================
# Spring Boot Admin Client
# ==============================
spring.boot.admin.client.url=http://localhost:9090

# ==============================
# Actuator
# ==============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==============================
# Kafka Configuration
# ==============================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
#spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=product-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Reliability
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# Consumer safety
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.isolation.level=read_committed

# Performance tuning
spring.kafka.producer.properties.batch.size=16384
spring.kafka.producer.properties.linger.ms=5
spring.kafka.producer.properties.compression.type=snappy

spring.kafka.producer.acks=all
spring.kafka.producer.retries=5
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.transaction-id-prefix=product-tx-
